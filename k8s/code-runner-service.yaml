apiVersion: apps/v1
kind: Deployment
metadata:
  name: code-runner-service
  namespace: app
  labels:
    app.kubernetes.io/name: code-runner-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: code-runner-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: code-runner-service
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
                  - key: node-role.kubernetes.io/master
                    operator: DoesNotExist
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: code-runner-service
              topologyKey: kubernetes.io/hostname
      containers:
        - name: code-runner-service
          image: IMAGE_PLACEHOLDER
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "2"
              memory: 1Gi
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://main-postgres.infra.svc.cluster.local:5432/main_service
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: code-runner-main-database
                  key: username
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: code-runner-main-database
                  key: password
            - name: SPRING_RABBITMQ_HOST
              value: rabbitmq.infra.svc.cluster.local
            - name: SPRING_RABBITMQ_PORT
              value: "5672"
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: code-runner-rabbitmq
                  key: username
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: code-runner-rabbitmq
                  key: password
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              value: /
            - name: DOCKER_HOST
              value: unix:///var/run/docker.sock
          volumeMounts:
            - name: docker-sock
              mountPath: /var/run/docker.sock
      volumes:
        - name: docker-sock
          hostPath:
            path: /var/run/docker.sock
            type: Socket
---
apiVersion: v1
kind: Service
metadata:
  name: code-runner-service
  namespace: app
  labels:
    app.kubernetes.io/name: code-runner-service
spec:
  selector:
    app.kubernetes.io/name: code-runner-service
  ports:
    - name: http
      port: 80
      targetPort: http
