name: Deploy Code Runner Service

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/sunboys-hits/code-runner-service
  DEPLOYMENT_NAME: code-runner-service
  NAMESPACE: app
  RABBITMQ_USERNAME: sunboys_app
  MAIN_DB_USERNAME: main_service

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        run: echo "IMAGE=${IMAGE_NAME}:${GITHUB_SHA}" >> "$GITHUB_ENV"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Configure kubeconfig
        run: |
          test -n "${{ secrets.KUBECONFIG_B64 }}" || {
            echo 'KUBECONFIG_B64 GitHub Actions secret is not configured' >&2
            exit 1
          }
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure namespace exists
        run: kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -

      - name: Configure RabbitMQ connection
        env:
          RABBITMQ_PASSWORD: ${{ secrets.CODE_RUNNER_RABBITMQ_PASSWORD }}
        run: |
          test -n "$RABBITMQ_PASSWORD" || {
            echo 'CODE_RUNNER_RABBITMQ_PASSWORD GitHub Actions secret is not configured' >&2
            exit 1
          }
          kubectl -n "$NAMESPACE" create secret generic code-runner-rabbitmq \
            --from-literal=username="$RABBITMQ_USERNAME" \
            --from-literal=password="$RABBITMQ_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Configure main database connection
        env:
          MAIN_DB_PASSWORD: ${{ secrets.MAIN_DB_PASSWORD }}
        run: |
          test -n "$MAIN_DB_PASSWORD" || {
            echo 'MAIN_DB_PASSWORD GitHub Actions secret is not configured' >&2
            exit 1
          }
          kubectl -n "$NAMESPACE" create secret generic code-runner-main-database \
            --from-literal=username="$MAIN_DB_USERNAME" \
            --from-literal=password="$MAIN_DB_PASSWORD" \
            --dry-run=client \
            -o yaml | kubectl apply -f -

      - name: Deploy manifests
        run: sed "s|IMAGE_PLACEHOLDER|${IMAGE}|g" k8s/code-runner-service.yaml | kubectl apply -f -

      - name: Wait for rollout
        run: kubectl -n "$NAMESPACE" rollout status deployment/"$DEPLOYMENT_NAME" --timeout=180s

      - name: Show deployment
        run: kubectl -n "$NAMESPACE" get deployment,pod -l app.kubernetes.io/name="$DEPLOYMENT_NAME" -o wide
